spring:
  application:
    name: kafka-micro

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:kafka-micro-group}
      auto-offset-reset: earliest
      enable-auto-commit: false  # Ручное управление коммитами
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 100
      properties:
        spring.json.trusted.packages: "*"
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      acks: all
    listener:
      ack-mode: manual_immediate  # Ручное подтверждение
      missing-topics-fatal: false

server:
  port: 8097

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Настройки топиков
kafka:
  topics:
    input-topic: ${KAFKA_INPUT_TOPIC:myapp-topic}
    output-topic: ${KAFKA_OUTPUT_TOPIC:myapp-response-topic}
    dead-letter-topic: ${KAFKA_DLQ_TOPIC:myapp-dlq-topic}

  # Максимальное количество сообщений для кэширования
  cache:
    max-size: 10000

logging:
  level:
    com.example.kafkamicro: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"